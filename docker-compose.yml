services:
  db:
    image: postgres:15-alpine
    container_name: mergeskills-db-ldw
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: mergeskills
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: